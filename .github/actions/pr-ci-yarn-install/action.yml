name: PR CI yarn install
description: Root + renderer main + engine-link-startup（与 pull-request-test 一致，含重试）
runs:
  using: composite
  steps:
    - name: Install dependencies (root + renderer)
      shell: bash
      run: |
        set -uo pipefail
        reg='https://registry.npmjs.org/'
        ok=false
        for attempt in 1 2 3 4 5; do
          if yarn install --frozen-lockfile --registry "$reg" && \
             yarn install --ignore-scripts --cwd app/renderer/src/main --registry "$reg" && \
             yarn install --ignore-scripts --cwd app/renderer/engine-link-startup --registry "$reg"; then
            ok=true
            break
          fi
          echo "Install attempt ${attempt}/5 failed, retrying after backoff..."
          sleep $((attempt * 20))
        done
        if [ "$ok" != true ]; then
          echo 'yarn install failed after 5 attempts'
          exit 1
        fi
