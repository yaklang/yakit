# pull_request 事件里声明 pull-requests:write 会在 Set up job 报 Repository access blocked
#（尤其 Fork PR）。本 workflow 用 workflow_run 在仓库侧发评论，权限与 pull_request 解耦。
# 注意：workflow_run 需存在于仓库默认分支后才会触发。
name: PR CI comment

on:
  workflow_run:
    workflows: ['pull_request test']
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  post-pr-summary-comment:
    name: PR 汇总评论
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled' &&
      github.event.workflow_run.pull_requests[0] != null &&
      github.event.workflow_run.head_repository.fork == false
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Download PR summary body
        id: download_summary
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: ci-pr-summary-body

      - name: Maintain one PR comment
        if: steps.download_summary.outcome == 'success'
        uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          number: ${{ github.event.workflow_run.pull_requests[0].number }}
          body-include: '<!-- pr-ci-one-comment -->'
          body-path: pr-comment.md
