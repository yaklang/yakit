name: pull_request test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - package.json
      - yarn.lock
      - README.md
      - README-EN.md
      - README_LEGACY.md
      - LICENSE.md
      - docs/**
      # - .github/**
      - '**/*.md'
      - '**/*.txt'
      - .vscode/**

jobs:
  pr-test:
    name: pull_request test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1

      - name: Check i18n parity (zh/en)
        id: i18n_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          yarn i18n:check 2>&1 | tee i18n-output.log

      - name: Comment i18n failure on PR
        if: steps.i18n_check.outcome == 'failure' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pull-request-test -->'
            const rawLog = fs.existsSync('i18n-output.log')
              ? fs.readFileSync('i18n-output.log', 'utf8').slice(-6000)
              : 'No log available.'
            const body = `${marker}\nвқҢ i18n жЈҖжҹҘеӨұиҙҘ\n\nй”ҷиҜҜдҝЎжҒҜпјҡ\n\`\`\`\n${rawLog}\n\`\`\``
            const issue_number = context.payload.pull_request.number
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            })
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              })
            }

      - name: Stop CI on i18n failure
        if: steps.i18n_check.outcome == 'failure'
        run: |
          echo "i18n check failed."
          exit 1

      - name: Get PR changed files
        id: changed_files
        uses: tj-actions/changed-files@v47
        with:
          # жҳҺзЎ®жҢҮе®ҡ base_shaпјҢзЎ®дҝқеҸӘеҜ№жҜ” PR жң¬иә«зҡ„ж”№еҠЁ
          base_sha: ${{ github.event.pull_request.base.sha }}
          separator: "\n"

      - name: Format or check PR changed files with prettier
        id: format_step
        continue-on-error: true
        shell: bash
        env:
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -o pipefail
          {
          CHANGED_FILES="${{ steps.changed_files.outputs.all_changed_files }}"

          format_targets=()
          while IFS= read -r file; do
            [ -f "$file" ] && format_targets+=("$file")
          done <<< "$CHANGED_FILES"

          if [ "${#format_targets[@]}" -eq 0 ]; then
            echo "No files to format."
            exit 0
          fi

          if [ "$IS_FORK_PR" = 'true' ]; then
            echo "Fork PR detected. Checking ${#format_targets[@]} file(s) with prettier..."
            npx prettier@3.8.1 --config .prettierrc.js --ignore-path .prettierignore --check --ignore-unknown "${format_targets[@]}"
          else
            echo "Same-repo PR detected. Formatting ${#format_targets[@]} file(s) with prettier..."
            npx prettier@3.8.1 --config .prettierrc.js --ignore-path .prettierignore --write --ignore-unknown "${format_targets[@]}"
          fi
          } 2>&1 | tee format-output.log

      - name: Comment format failure on PR
        if: steps.format_step.outcome == 'failure' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pull-request-test -->'
            const rawLog = fs.existsSync('format-output.log')
              ? fs.readFileSync('format-output.log', 'utf8').slice(-6000)
              : 'No log available.'
            const body = `${marker}\nвқҢ prettier ж јејҸеҢ–еӨұиҙҘ\n\nй”ҷиҜҜдҝЎжҒҜпјҡ\n\`\`\`\n${rawLog}\n\`\`\``
            const issue_number = context.payload.pull_request.number
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            })
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              })
            }

      - name: Stop CI on format failure
        if: steps.format_step.outcome == 'failure'
        run: |
          echo "prettier format check failed."
          exit 1

      - name: Commit formatted files
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # GITHUB_TOKEN cannot update workflow files without extra app permission.
          # Unstage workflow paths to avoid push rejection.
          git reset -- .github/workflows || true
          if git diff-index --quiet HEAD; then
            echo "No formatting changes, nothing to commit"
          else
            git commit -m "style: apply prettier formatting [skip ci]"
            git push
          fi

      - name: Comment pull_request format and check success on PR
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pull-request-test -->'
            const body = [
              marker,
              '## вң… CI жЈҖжҹҘйҖҡиҝҮ',
              '',
              'жң¬ж¬Ў PR е·Іе®ҢжҲҗд»ҘдёӢиҮӘеҠЁжЈҖжҹҘпјҡ',
              '',
              '- вң… i18n й…ҚзҪ®ж ЎйӘҢйҖҡиҝҮпјҲzh/enпјү',
              '- вң… Prettier ж јејҸеҢ–е·Іе®ҢжҲҗ',
              '- вң… з»“жһңе·ІиҮӘеҠЁжҸҗдәӨеҲ°еҪ“еүҚ PR еҲҶж”ҜпјҲеҰӮжңүеҸҳжӣҙпјү',
              '',
              '---',
              '_з”ұ pull_request test workflow иҮӘеҠЁз”ҹжҲҗ_',
            ].join('\n')
            const issue_number = context.payload.pull_request.number

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            })

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              })
            }
