name: pull_request test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [test]
    paths-ignore:
      - package.json
      - yarn.lock
      - README.md
      - README-EN.md
      - README_LEGACY.md
      - LICENSE.md
      - docs/**
      - .github/**
      - '**/*.md'
      - '**/*.txt'
      - .vscode/**

env:
  HUSKY: '0'

jobs:
  pr-test:
    name: pull_request test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1

      - name: Install dependencies (root + renderer)
        shell: bash
        run: |
          set -uo pipefail
          # yarnpkg.com 偶发 500；直连 npm 官方源 + 重试，降低 CI 抖动
          reg='https://registry.npmjs.org/'
          ok=false
          for attempt in 1 2 3 4 5; do
            if yarn install --frozen-lockfile --registry "$reg" && \
               yarn install --ignore-scripts --cwd app/renderer/src/main --registry "$reg" && \
               yarn install --ignore-scripts --cwd app/renderer/engine-link-startup --registry "$reg"; then
              ok=true
              break
            fi
            echo "Install attempt ${attempt}/5 failed, retrying after backoff..."
            sleep $((attempt * 20))
          done
          if [ "$ok" != true ]; then
            echo 'yarn install failed after 5 attempts'
            exit 1
          fi

      - name: Get PR changed files
        id: changed_files
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          safe_output: false

      - name: Print PR changed files
        shell: bash
        env:
          ALL_CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
        run: |
          echo "Changed files from tj-actions/changed-files:"
          if [ -z "$ALL_CHANGED_FILES" ]; then
            echo "(none)"
          else
            for file in $ALL_CHANGED_FILES; do
              echo "$file"
            done
          fi

      - name: Write PR changed paths (git UTF-8, for Prettier/media)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git -c core.quotePath=false diff --name-only "$BASE_SHA" "$HEAD_SHA" > .ci-changed-files-list.txt
          echo "Changed path lines: $(wc -l < .ci-changed-files-list.txt)"
          echo '---- sample paths (debug) ----'
          head -5 .ci-changed-files-list.txt || true
          echo '-------------------------------'

      - name: Check i18n parity (zh/en)
        id: i18n_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          yarn i18n:check 2>&1 | tee i18n-output.log

      - name: ESLint (renderer src)
        id: eslint_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd app/renderer/src/main
          root="$(git rev-parse --show-toplevel)"
          npx eslint src --ext .js,.jsx,.ts,.tsx 2>&1 | tee "$root/eslint-output.log"

      - name: TypeScript (tsc --noEmit, renderer)
        id: tsc_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd app/renderer/src/main
          root="$(git rev-parse --show-toplevel)"
          npx tsc -p tsconfig.json --noEmit 2>&1 | tee "$root/tsc-output.log"

      - name: ESLint (engine-link-startup)
        id: eslint_engine_link_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd app/renderer/engine-link-startup
          root="$(git rev-parse --show-toplevel)"
          npx eslint src --ext .js,.jsx,.ts,.tsx 2>&1 | tee "$root/eslint-engine-link-output.log"

      - name: TypeScript (tsc --noEmit, engine-link-startup)
        id: tsc_engine_link_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd app/renderer/engine-link-startup
          root="$(git rev-parse --show-toplevel)"
          npx tsc -p tsconfig.json --noEmit 2>&1 | tee "$root/tsc-engine-link-output.log"

      - name: Media size check (changed images/videos)
        id: media_check
        continue-on-error: true
        shell: bash
        env:
          CHANGED_FILES_PATH: ${{ github.workspace }}/.ci-changed-files-list.txt
        run: |
          set -o pipefail
          node scripts/check-media-size.js 2>&1 | tee media-output.log

      - name: Format or check PR changed files with prettier
        id: format_step
        continue-on-error: true
        shell: bash
        env:
          ALL_CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -o pipefail
          {
            format_targets=()
            if [ -f .ci-changed-files-list.txt ]; then
              while IFS= read -r file || [ -n "$file" ]; do
                [ -z "$file" ] && continue
                if [ -f "$file" ]; then
                  format_targets+=("$file")
                fi
              done < .ci-changed-files-list.txt
            else
              for file in $ALL_CHANGED_FILES; do
                if [ -f "$file" ]; then
                  format_targets+=("$file")
                fi
              done
            fi

            if [ "${#format_targets[@]}" -eq 0 ]; then
              echo "No valid files to format."
              exit 0
            fi

            if [ "$IS_FORK_PR" = 'true' ]; then
              echo "Fork PR detected. Checking ${#format_targets[@]} file(s)..."
              npx prettier@3.8.1 --config .prettierrc.js --ignore-path .prettierignore --check --ignore-unknown "${format_targets[@]}"
            else
              echo "Same-repo PR detected. Formatting ${#format_targets[@]} file(s)..."
              npx prettier@3.8.1 --config .prettierrc.js --ignore-path .prettierignore --write --ignore-unknown "${format_targets[@]}"
            fi
          } 2>&1 | tee format-output.log

      - name: Render PR CI summary (body for maintain-one-comment)
        id: pr_comment
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          OUTCOME_I18N: ${{ steps.i18n_check.outcome }}
          OUTCOME_ESLINT: ${{ steps.eslint_check.outcome }}
          OUTCOME_TSC: ${{ steps.tsc_check.outcome }}
          OUTCOME_ESLINT_ENGINE_LINK: ${{ steps.eslint_engine_link_check.outcome }}
          OUTCOME_TSC_ENGINE_LINK: ${{ steps.tsc_engine_link_check.outcome }}
          OUTCOME_MEDIA: ${{ steps.media_check.outcome }}
          OUTCOME_FORMAT: ${{ steps.format_step.outcome }}
        run: node scripts/ci-render-pr-summary.js

      - name: Maintain one PR comment
        if: always() && github.event.pull_request.head.repo.full_name == github.repository && steps.pr_comment.outcome == 'success'
        uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body-include: '<!-- pr-ci-one-comment -->'
          body: ${{ steps.pr_comment.outputs.body }}

      - name: Commit formatted files
        if: steps.format_step.outcome == 'success' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows || true
          if git diff-index --quiet HEAD; then
            echo "No formatting changes, nothing to commit"
          else
            git commit -m "style: apply prettier formatting [skip ci]"
            git push
          fi

      - name: Job conclusion (red if any check failed)
        if: always()
        run: |
          set -euo pipefail
          any_fail=false
          for s in \
            '${{ steps.i18n_check.outcome }}' \
            '${{ steps.eslint_check.outcome }}' \
            '${{ steps.tsc_check.outcome }}' \
            '${{ steps.eslint_engine_link_check.outcome }}' \
            '${{ steps.tsc_engine_link_check.outcome }}' \
            '${{ steps.media_check.outcome }}' \
            '${{ steps.format_step.outcome }}'
          do
            if [ "$s" = 'failure' ]; then any_fail=true; fi
          done
          if [ "$any_fail" = true ]; then
            echo 'One or more checks failed. See maintain-one-comment summary on PR.'
            exit 1
          fi
          echo 'All checks passed.'
