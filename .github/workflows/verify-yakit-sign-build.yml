name: Verify Yakit Sign and Notarize Build

on:
  workflow_dispatch:

jobs:
  verify_sign_build:
    runs-on: macos-15
    env:
      # electron-builder 在 CI=true 时会改变部分行为，此处显式清空
      CI: ''
      NODE_OPTIONS: --max_old_space_size=4096
      # 签名 + 公证（after-sign.js / signature.sh）
      APPLE_ID: ${{ secrets.APPLE_ACCOUNT_EMAIL }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: yarn

      - name: Prepare build env
        run: |
          set -euo pipefail
          mkdir -p bins/scripts

          wget -q -O bins/engine-version.txt https://yaklang.oss-accelerate.aliyuncs.com/yak/latest/version.txt
          echo "ENGINE_VERSION=$(tr -d '\n\r' < bins/engine-version.txt)" >> "$GITHUB_ENV"

          PKG_VERSION=$(node -p 'require("./package.json").version')
          SOFTWARE_VERSION="${PKG_VERSION%-ce}"
          SOFTWARE_VERSION="${SOFTWARE_VERSION%-ee}"
          echo "SOFTWARE_VERSION=${SOFTWARE_VERSION}" >> "$GITHUB_ENV"

          # electron-builder mac 打包依赖系统 zip；仓库自带兼容版本
          cp buildutil/zip /usr/local/bin/zip && chmod +x /usr/local/bin/zip

          # extraFiles 强制打包 chrome 扩展，缺失会直接导致 pack 失败
          extensionVersion=$(curl -fsL "https://yaklang.oss-accelerate.aliyuncs.com/chrome-extension/latest-version.txt" | tr -d '\n\r') || {
            echo "Failed to download chrome extension version" >&2
            exit 1
          }
          wget -q -O bins/scripts/google-chrome-plugin.zip \
            "https://yaklang.oss-accelerate.aliyuncs.com/chrome-extension/yakit-chrome-extension-v${extensionVersion}.zip"
        shell: bash

      - name: Download and sign Yak engine
        run: |
          set -euo pipefail
          YAK_BASE="https://yaklang.oss-accelerate.aliyuncs.com/yak/${ENGINE_VERSION}"
          wget -q -O bins/yak_darwin_amd64 "${YAK_BASE}/yak_darwin_amd64"
          wget -q -O bins/yak_darwin_arm64 "${YAK_BASE}/yak_darwin_arm64"
          # 下载官方 sha256（打包进 app 的 engine-sha256.txt）；签名会把二进制打成 zip
          wget -q -O bins/yak_darwin_amd64.sha256.txt "${YAK_BASE}/yak_darwin_amd64.sha256.txt"
          wget -q -O bins/yak_darwin_arm64.sha256.txt "${YAK_BASE}/yak_darwin_arm64.sha256.txt"
          chmod +x ./packageScript/script/signature.sh
          # 无 build 参数：导入证书并对引擎 codesign（验证签名链路需要）
          ./packageScript/script/signature.sh
        shell: bash

      - name: Install dependencies
        run: yarn install

      - name: Build Yakit
        run: |
          set -euo pipefail
          chmod +x ./packageScript/script/buildPreScript.sh ./packageScript/script/installRender.sh
          ./packageScript/script/buildPreScript.sh yakit
          rm -rf ./app/renderer/engine-link-startup/dist ./app/renderer/pages ./release
          ./packageScript/script/installRender.sh ce
          # signNormal -> CSC_IDENTITY_AUTO_DISCOVERY=true，具备 Apple 密钥时会走公证
          yarn pack-mac
        shell: bash

      - name: Upload mac installers
        uses: actions/upload-artifact@v4
        with:
          name: Yakit-${{ env.SOFTWARE_VERSION }}-darwin-dmg
          path: |
            ./release/Yakit-${{ env.SOFTWARE_VERSION }}-darwin-x64.dmg
            ./release/Yakit-${{ env.SOFTWARE_VERSION }}-darwin-arm64.dmg
          if-no-files-found: error
          retention-days: 3
