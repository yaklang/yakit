appId: "io.yaklang.yakit"
productName: "Yakit"
copyright: Copyright © 2024 yaklang.io

extraFiles:
    - from: "bins/scripts/auto-install-cert.zip"
      to: "bins/scripts/auto-install-cert.zip"
    - from: "bins/scripts/start-engine.zip"
      to: "bins/scripts/start-engine.zip"
    - from: "bins/scripts/google-chrome-plugin.zip"
      to: "bins/scripts/google-chrome-plugin.zip"
    - from: "bins/flag.txt"
      to: "bins/flag.txt"
    - from: "bins/engine-version.txt"
      to: "bins/engine-version.txt"
    - from: "bins/yakit-system-mode.txt"
      to: "bins/yakit-system-mode.txt"
    - from: "bins/resources"
      to: "bins/resources"
      filter:
          - "**/*"
          - "*.txt"
    - from: "bins/database/"
      to: "bins/database/"
      filter:
          - "**/*"
          - "*.txt"
          - "*.gzip"
          - "!*.db"
    - from: "report/template.zip"
      to: "report/template.zip"

directories:
    buildResources: resources
    output: release/
    app: .

files:
    - "**/*"
    - "!bins/**/*"
    - "!.github/**/*"
    - "!multibuilder/**/*"
    - "!scripts/**/*"
    - "!buildutil/**/*"
    - "!buildHooks/**/*"
    - "!build/**/*"
    - "!backups/**/*"
    - "!app/renderer/src/**/*"

asar: true

publish:
    - provider: "generic"
      url: https://yaklang.oss-cn-beijing.aliyuncs.com/yak/latest/

mac:
    hardenedRuntime: true
    gatekeeperAssess: false
    entitlements: "packageScript/plist/entitlements.mac.plist"
    entitlementsInherit: "packageScript/plist/entitlements.mac.plist"
    target:
        - target: dmg
          arch:
              - x64
              - arm64
    icon: "app/assets/yakitlogo.icns"

beforePack: "packageScript/buildHook/before-pack.js"
afterSign: "packageScript/buildHook/after-sign.js"

releaseInfo:
    releaseName: ${version}
    releaseNotes: "view github release: https://github.com/yaklang/yakit/releases"
