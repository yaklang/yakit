<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8">
  <title>引擎 Console</title>
  <link rel="stylesheet" href="./xterm@5.3.0/xterm.css">
  <link rel="stylesheet" href="./theme.css">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--main-bg);
      color: var(--main-foreground);
      overflow: hidden;
    }

    #terminal {
      width: 100vw;
      height: 100vh;
      background: var(--main-bg);
    }
  </style>
</head>

<body>
  <div id="terminal"></div>
  <script src="./xterm@5.3.0/xterm.js"></script>
  <script src="./xterm-addon-fit@0.7.0/xterm-addon-fit.js"></script>
  <script>
    const { ipcRenderer } = require('electron')
    ipcRenderer.on('xterm-data', (event, data) => {
      term.write(data)
    })

    const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const term = new window.Terminal({
      convertEol: true,
      theme: {
        foreground: getCssVar('--main-foreground'),
        background: getCssVar('--main-bg'),
        cursor: getCssVar('--main-cursor'),
        black: getCssVar('--main-black'),
        brightBlack: getCssVar('--main-brightBlack'),
        red: getCssVar('--main-red'),
        brightRed: getCssVar('--main-brightRed'),
        green: getCssVar('--main-green'),
        brightGreen: getCssVar('--main-brightGreen'),
        yellow: getCssVar('--main-yellow'),
        brightYellow: getCssVar('--main-brightYellow'),
        blue: getCssVar('--main-blue'),
        brightBlue: getCssVar('--main-brightBlue'),
        magenta: getCssVar('--main-magenta'),
        brightMagenta: getCssVar('--main-brightMagenta'),
        cyan: getCssVar('--main-cyan'),
        brightCyan: getCssVar('--main-brightCyan'),
        white: getCssVar('--main-white'),
        brightWhite: getCssVar('--main-brightWhite')
      }
    })
    const fitAddon = new window.FitAddon.FitAddon()
    term.loadAddon(fitAddon)

    term.open(document.getElementById('terminal'))
    fitAddon.fit()

    // 监听窗口大小变化
    window.addEventListener('resize', () => fitAddon.fit())

    // 复制
    term.attachCustomKeyEventHandler((event) => {
      if ((event.ctrlKey || event.metaKey) && event.code === "KeyC") {
        const selection = term.getSelection()
        if (selection) {
          ipcRenderer.send('console-terminal-window-copy', selection)
          return false
        }
      }
      return true
    })
  </script>
</body>

</html>
